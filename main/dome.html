<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> MAX_AVP_Fx</title>
    
    <style>
        .box{
            background-color: bisque;
            width: 100%;
            height: 1500px;
            margin: auto;
            font-size: 26px;
            font-weight: 10px;
        }
        .content{
            background-color: aqua;
            width: 80%;
            height: 80px;
            position: relative;
            left: 80px;
        }
        .top_content{
            background-color: aqua;
            position: relative;
            height: 300px;
        }
        .a_content{
            background-color: aquamarine;
            height: 800px;
        }
        .b_content{
            background-color: blue;
            height: 100px;
        }
        .c_content{
            background-color: rgb(222, 62, 44);
            height: 200px;
        }
    </style>
    <script src="./js/main.js"></script>
    <script src="./js/fx.js"></script>
</head>
<body>
    <div class="box">
         <!--top-->
        <div class="content top_content">
            <style>
                #text_f{
                    position: relative;
                    left: 10px;
                }
                #text_val{
                    width: 150px;
                }
                #text2_val{
                    width: 50px;
                }
                #text3_val{
                    width: 50px;
                }
            </style>
            <script>
                let fx_type;
                function f_T_D() {
                    fx_Type = 0;
                    console.log('输入时域');
                    let f1_id = document.getElementById('f1_text');
                    f1_id.placeholder = 'sin(x)';
                }

                function f_F_D() {
                    fx_Type = 1;
                    console.log('输入频域');
                    let f1_id = document.getElementById('f1_text');
                    f1_id.placeholder = 'exp(x)';
                }
            </script>
            <label>输入类型:</label>
            <input class="input_type" name="f" type="radio" onclick="f_T_D()" checked="radio" >时域
            <input class="input_type" name="f" type="radio" onclick="f_F_D()">频域
            <span id='text_f'>
                <label>显示频率</label>
                <input id="text_val" type="range" value=1 min="0" max="100">
                <label>下</label>
                <input id="text2_val" type="number" value=0 placeholder="0">
                <label>上</label>
                <input id="text3_val" type="number" value=100 placeholder="100">
            </span>
            <table class="in_fx_table" id="table_fx_">
                <style>
                .in_fx_table{
                    width: 60%;
                }
                .tr_top{
                    font-size: 20px; 
                    font-weight: 5px;
                }
                 .tr_content{
                    font-size: 20px; 
                    font-weight: 5px;
                }
                .f_min,.f_max{
                   width: 50px;
                }
                </style>
                <tr class="tr_top">
                    <th>函数原型</th>
                    <th>最小值</th>
                    <th>最大值</th>
                    <th><button onclick="add_input_Table(this)">增加函数</button><button onclick="text_fun()">测试</button><button onclick="bu_val_sumDraw_fun(this)">结果合</button></th>
                </tr>
                <tr class="tr_content">
                    <td><input class="f_text" id="f1_text" type="text" value="sin(x)" placeholder="sin(x)"></td>
                    <td><input class="f_min" id="f1_min" type="number" value=0 placeholder="0"></td>
                    <td><input class="f_max" id="f1_max" type="number" value=6.28 placeholder="6.28"></td>
                    <td><button onclick="fx_bool_Fun(this)">启用</button></td>
                </tr>
            </table>
        </div> 


        <!--a_content-->
        <div class="content a_content">
            <style>
                .content_a_top_text{
                    background-color: bisque;
                    width: 100%;
                }
                
                .fx_canvas_box{
                    background-color: rgb(57, 43, 27);
                    width: 100%;
                    height: 80%;
                }
               
                .fx_canvas{
                    background-color: rgb(237, 237, 228);
                    position: relative;
                }

                #input_fx_canvas{
                    width: 300px;
                    height: 300px;
                }
                #MP_fx_canvas{
                    width: 300px;
                    height: 300px;
                    left: 100px;
                }
                #output_fx_canvas{
                    width: 300px;
                    height: 300px;
                    left: 200px;
                }
                #output2_fx_canvas{
                    width: 300px;
                    height: 300px;
                    left: 300px;
                }
            </style>
            <div class="content_a_top_text">INPUT_OUTPUT</div>
            <div class="fx_canvas_box">
                <script>
                    let input_fx_canvas = document.createElement('canvas');
                    input_fx_canvas.classList.add('fx_canvas');
                    input_fx_canvas.id='input_fx_canvas';
                    input_fx_canvas.width = 300;
                    input_fx_canvas.height = 300;
                    let MP_fx_canvas = document.createElement('canvas');
                    MP_fx_canvas.classList.add('fx_canvas');
                    MP_fx_canvas.id='MP_fx_canvas';
                    MP_fx_canvas.width = 300;
                    MP_fx_canvas.height = 300;                    
                    let output_fx_canvas = document.createElement('canvas');
                    output_fx_canvas.classList.add('fx_canvas');
                    output_fx_canvas.id='output_fx_canvas';
                    output_fx_canvas.width = 300;
                    output_fx_canvas.height = 300;         
                    let output2_fx_canvas = document.createElement('canvas');
                    output2_fx_canvas.classList.add('fx_canvas');
                    output2_fx_canvas.id='output2_fx_canvas';
                    output2_fx_canvas.width = 300;
                    output2_fx_canvas.height = 300;         
                </script>
                <script>
                    let currentScript = document.currentScript;

                    currentScript.parentNode.insertBefore(input_fx_canvas,currentScript);
                    currentScript.parentNode.insertBefore(MP_fx_canvas,currentScript);
                    currentScript.parentNode.insertBefore(output_fx_canvas,currentScript);
                    currentScript.parentNode.insertBefore(output2_fx_canvas,currentScript);
                    
                    fx_Draw_Axis(input_fx_canvas);
                    fx_Draw_Axis(MP_fx_canvas);
                    points_Draw_Axis(output_fx_canvas,0);
                    fx_Draw_Axis(output2_fx_canvas);
                </script>
            </div>
        </div>


        <!--b_content-->
        <div class="content b_content">
            <button id="connectBtn">连接</button>
            <button id="disconnectBtn">关闭</button>
            <script src="./js/IN_UART.js"></script>
        </div>


        <!--c_content-->
        <div class="content c_content">

        </div>

    </div>
    <script src="./js/end.js"></script>
</body>
</html>
