<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时域频域转换函数</title>
    <script src="./js/main.js"></script>
    <script>
        let fx_type;

        function f_T_D() {
            console.log("f_T_D");
            let f_id = document.getElementById('f_text');
            f_id.placeholder = 'sin(x)';
        }

        function f_F_D() {
            console.log("f_F_D");
            let f_id = document.getElementById('f_text');
            f_id.placeholder = 'exp(x)';
        }
        console.log("js_Inited");
    </script>
    <style>
        #canvas_input {
            background-color: rgb(71, 194, 55);
        }
        #canvas_Moutput {
            background-color: rgb(71, 194, 55);
            position:relative;
            left:200px;
        }
        #canvas_output {
            background-color: rgb(71, 194, 55);
            position:relative;
            left:400px;
        }
    </style>
</head>
<body>
    <div class="adc">
        <form id="input">
            <label>输入类型:</label>
            <input id="f_t" type="radio" name="f" checked="radio" onclick="f_T_D()">时域
            <input id="f_f" type="radio" name="f" onclick="f_F_D()">频域
            <br><br>
            <label>f(x):</label>
            <input id="f_text" type="text" placeholder="sin(x)">
            <label>X_Min:</label>
            <input id="f_min" type="text">
            <label>X_Max:</label>
            <input id="f_max" type="text">
            <label>X_Step:</label>
            <input id="f_Step" type="text">
            <br><br><br><br><br><br>
        </form>
    </div>
    <div class="fx_canvas">
        <span class="canvas_all">
            
            <span class="canvas_input">
                <script>
                    let canvas_input_fx = document.createElement('canvas');
                    canvas_input_fx.width = 600;
                    canvas_input_fx.height = 400;
                    // canvas_input_fx.classList.add('canvas_input');
                    canvas_input_fx.id='canvas_input';
                    document.body.append(canvas_input_fx);
                </script>
            </span>
            <span class="canvas_output">
                <script>
                    let canvas_Mput_fx = document.createElement('canvas');
                    canvas_Mput_fx.width = 600;
                    canvas_Mput_fx.height = 400;
                    // canvas_output_fx.classList.add('canvas_output');
                    canvas_Mput_fx.id='canvas_Moutput';
                    document.body.append(canvas_Mput_fx);
                </script>
            </span>
            <span class="canvas_output">
                <script>
                    let canvas_output_fx = document.createElement('canvas');
                    canvas_output_fx.width = 600;
                    canvas_output_fx.height = 400;
                    // canvas_output_fx.classList.add('canvas_output');
                    canvas_output_fx.id='canvas_output';
                    document.body.append(canvas_output_fx);
                </script>
            </span>
            <script>
               
            </script>
        </span>
    </div>
</body>
</html>
